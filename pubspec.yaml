name: asset_app
description: "Asset Management System with RBAC and Audit Trail"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # ===== State Management =====
  provider: ^6.1.5+1               # state management (InheritedWidget wrapper)

  # ===== Firebase =====
  firebase_core: ^4.11.0           # Firebase core (จำเป็นต้องมี)
  firebase_auth: ^6.5.4            # Firebase Authentication (Google Sign-In)
  cloud_firestore: ^6.6.0          # Firestore NoSQL Database
  firebase_storage: ^13.4.3        # Firebase Storage (รูปภาพ)

  # ===== Storage =====
  shared_preferences: ^2.5.3       # Local cache (key-value ธรรมดา)
  flutter_secure_storage: ^9.2.2   # Secure storage (token/secret)
  hive: ^2.2.3                     # Local NoSQL database (offline audit)
  hive_flutter: ^1.1.0             # Hive สำหรับ Flutter (init)

  # ===== Utilities =====
  image_picker: ^1.2.0             # เลือก/ถ่ายรูปจากกล้องหรือแกลเลอรี
  intl: ^0.20.2                    # รูปแบบวันที่/ตัวเลข (ภาษาไทย)
  # uuid: ^4.5.3                   # (unused) ใช้ TempPhotoProvider สร้าง ID เอง
  equatable: ^2.0.5                # value equality (props) สำหรับ Model classes
  collection: ^1.19.1              # DeepCollectionEquality สำหรับ Map/List equality
  cached_network_image: ^3.4.1   # ✅ เพิ่ม — image caching

  # ===== Networking =====
  connectivity_plus: ^6.0.0        # ตรวจสอบสถานะอินเทอร์เน็ต (offline sync)

  # ===== Logging =====
  logger: ^2.0.2+1                 # structured logging (ใช้แทน print)

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^5.0.0            # lint rules ตาม Flutter style guide

flutter:
  uses-material-design: true

